<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变定义 -->
  <defs>
    <!-- 主背景渐变 - VSCode蓝色主题 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007ACC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005A9F;stop-opacity:1" />
    </linearGradient>
    
    <!-- pytest图标渐变 - Python金色 -->
    <linearGradient id="pytestGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD43B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA726;stop-opacity:1" />
    </linearGradient>
    
    <!-- DSL强调渐变 -->
    <linearGradient id="dslGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#29B6F6;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 主背景 - 圆角矩形 -->
  <rect x="8" y="8" width="112" height="112" rx="20" ry="20" fill="url(#bgGradient)" filter="url(#dropShadow)"/>
  
  <!-- pytest标识 - 左上角圆形图标 -->
  <circle cx="28" cy="28" r="8" fill="url(#pytestGradient)"/>
  <circle cx="28" cy="28" r="4" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- 主标题 pytest -->
  <text x="64" y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="16" font-weight="600" text-anchor="middle" fill="#FFFFFF">pytest</text>
  
  <!-- 分隔线 -->
  <line x1="35" y1="52" x2="93" y2="52" stroke="url(#dslGradient)" stroke-width="2" opacity="0.8"/>
  
  <!-- DSL标题 - 更突出 -->
  <text x="64" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="22" font-weight="700" text-anchor="middle" fill="url(#dslGradient)">DSL</text>
  
  <!-- 代码括号装饰 - 简约风格 -->
  <text x="40" y="75" font-family="SF Mono, Monaco, Consolas, monospace" 
        font-size="18" font-weight="300" fill="#4FC3F7" opacity="0.6">[</text>
  <text x="88" y="75" font-family="SF Mono, Monaco, Consolas, monospace" 
        font-size="18" font-weight="300" fill="#4FC3F7" opacity="0.6">]</text>
  
  <!-- 底部标识 -->
  <text x="64" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="9" text-anchor="middle" fill="#B3D9FF" opacity="0.7">VSCode Extension</text>
  
  <!-- 装饰性几何元素 -->
  <rect x="100" y="20" width="2" height="8" rx="1" fill="#4FC3F7" opacity="0.5"/>
  <rect x="20" y="100" width="8" height="2" rx="1" fill="#FFD43B" opacity="0.5"/>
  
  <!-- 右下角现代化点缀 -->
  <circle cx="108" cy="108" r="3" fill="#4FC3F7" opacity="0.3"/>
  <circle cx="108" cy="108" r="1.5" fill="#FFFFFF" opacity="0.8"/>
</svg> 